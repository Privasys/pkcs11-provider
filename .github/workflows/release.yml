name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build the module
        run: |
          make
          mv libprivasys_pkcs11.so "libprivasys_pkcs11-${GITHUB_REF_NAME}-linux-amd64.so"

      - name: Publish release with the .so artifact
        uses: softprops/action-gh-release@v2
        with:
          files: libprivasys_pkcs11-*.so
          generate_release_notes: true
