name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build the module
        run: make

      - name: Go vet
        run: go vet ./...

      - name: ABI smoke test (hand-rolled consumer)
        run: |
          cc test_harness.c -ldl -o harness
          python3 tools/mock_agent.py & echo $! > /tmp/agent.pid
          sleep 1
          PRIVASYS_PKCS11_VAULT=ci-vault PRIVASYS_PKCS11_AGENT=http://127.0.0.1:8210 \
            ./harness ./libprivasys_pkcs11.so
          kill "$(cat /tmp/agent.pid)" || true

      - name: Third-party consumer (opensc pkcs11-tool)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq opensc
          python3 tools/mock_agent.py & echo $! > /tmp/agent.pid
          sleep 1
          export PRIVASYS_PKCS11_VAULT=ci-vault PRIVASYS_PKCS11_AGENT=http://127.0.0.1:8210
          pkcs11-tool --module ./libprivasys_pkcs11.so --list-slots
          pkcs11-tool --module ./libprivasys_pkcs11.so --list-objects
          pkcs11-tool --module ./libprivasys_pkcs11.so --list-mechanisms
          kill "$(cat /tmp/agent.pid)" || true
